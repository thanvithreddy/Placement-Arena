<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result - Placement Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
        }
        .glass {
            background-color: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }
        
        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">
    <div id="confetti-root" class="confetti-container"></div>
    
    <div class="max-w-4xl w-full space-y-8">
        <!-- Header -->
        <div class="text-center space-y-4 pt-8">
            <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-emerald-400" id="exam-title">Loading Results...</h1>
            <p class="text-slate-400 text-lg">You've successfully completed the assessment.</p>
        </div>

        <!-- Score Highlights -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden md:col-span-1">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-500/10 to-transparent pointer-events-none"></div>
                <p class="text-slate-400 font-medium mb-2 relative z-10">Total Score</p>
                <div class="text-5xl font-bold text-white relative z-10 flex items-baseline gap-2">
                    <span id="total-score">0</span>
                    <span class="text-xl text-slate-500">/ 480</span>
                </div>
            </div>
            
            <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center">
                <p class="text-slate-400 font-medium mb-2">Rank</p>
                <h3 class="text-4xl font-bold text-amber-400" id="rank-badge">#—</h3>
            </div>
            
            <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center">
                <p class="text-slate-400 font-medium mb-2">Time Taken</p>
                <h3 class="text-3xl font-bold text-emerald-400" id="time-taken">—</h3>
            </div>
        </div>

        <!-- Section Breakdown -->
        <div class="glass p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-200">Section Breakdown</h3>
            <div class="space-y-6" id="sections-container">
                <!-- Dynamically injected -->
            </div>
        </div>

        <!-- Answer Review -->
        <div id="review-section" class="glass rounded-2xl p-6" style="display:none">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold">Answer Review</h3>
                <div class="flex gap-3">
                    <span class="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-400 text-xs">✓ Correct</span>
                    <span class="px-3 py-1 rounded-full bg-rose-500/20 text-rose-400 text-xs">✗ Wrong</span>
                    <span class="px-3 py-1 rounded-full bg-slate-500/20 text-slate-400 text-xs">— Skipped</span>
                </div>
            </div>
            <!-- Section tabs -->
            <div class="flex gap-2 mb-6" id="review-section-tabs"></div>
            <!-- Questions list -->
            <div id="review-questions-container"></div>
        </div>

        <button onclick="loadAnswerReview()" id="view-review-btn" class="w-full btn-outline py-3 rounded-xl font-semibold mt-4 transition border border-white/20 hover:bg-white/5">
            📋 View Answer Review
        </button>
        
        <!-- Actions -->
        <div class="flex justify-center gap-6 pt-4">
            <button onclick="window.location.href='/dashboard/index.html'" class="glass px-8 py-3 rounded-xl font-medium hover:bg-white/5 transition-colors border-slate-700">Back to Dashboard</button>
            <button onclick="window.location.href='/leaderboard/index.html'" class="btn-gradient px-8 py-3 rounded-xl font-semibold shadow-lg">View Leaderboard</button>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';
        function getHeaders() {
            const token = localStorage.getItem('access_token');
            return { headers: { Authorization: `Bearer ${token}` } };
        }

        function createConfetti() {
            const root = document.getElementById('confetti-root');
            const colors = ['#7c3aed', '#a78bfa', '#10b981', '#f43f5e', '#f59e0b', '#3b82f6'];
            
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 2) + 's';
                root.appendChild(conf);
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
        
        function capitalize(s) { return s[0].toUpperCase() + s.slice(1); }

        function formatTime(seconds) {
            if (!seconds) return '—';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const examId = params.get('exam_id');
            
            if(!examId) {
                window.location.href = '/dashboard/index.html';
                return;
            }

            try {
                const res = await axios.get(`${API}/exams/${examId}/result/`, getHeaders());
                const data = res.data;
                window._resultData = data;
                
                document.getElementById('exam-title').innerText = data.exam_title || 'Mock Test Results';
                
                // Animate score
                animateValue(document.getElementById('total-score'), 0, data.total_score || 0, 2000);
                
                // Set Rank
                const rank = data.rank || '-';
                document.getElementById('rank-badge').innerText = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                
                // Set Time
                document.getElementById('time-taken').innerText = formatTime(data.time_taken_seconds);
                
                // Sections
                const container = document.getElementById('sections-container');
                container.innerHTML = '';
                
                if(data.sections) {
                    data.sections.forEach(sec => {
                        const pct = sec.max_score ? Math.round((sec.score / sec.max_score) * 100) : 0;
                        const correctStr = sec.section_type === 'coding' ? '' : `<span class="text-xs text-slate-400">(${sec.correct}/${sec.question_count} correct)</span>`;
                        
                        container.innerHTML += `
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <div class="font-medium text-slate-200 flex items-center gap-2">
                                        ${capitalize(sec.section_type)}
                                        ${correctStr}
                                    </div>
                                    <div class="font-bold text-white">${sec.score} / ${sec.max_score}</div>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-2.5 border border-white/5 overflow-hidden">
                                    <div class="bg-gradient-to-r from-purple-500 to-indigo-500 h-2.5 rounded-full" style="width: ${pct}%"></div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                createConfetti();
                
            } catch(e) {
                console.error(e);
                alert("Failed to load results. They may still be processing.");
            }
        }

        let reviewLoaded = false;

        async function loadAnswerReview() {
            if (reviewLoaded) {
                const sec = document.getElementById('review-section');
                sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
                return;
            }
            
            const btn = document.getElementById('view-review-btn');
            btn.innerText = 'Loading review...';
            btn.disabled = true;
            
            try {
                // Fetch section attempts and their answers
                // Use the result data already loaded (window._resultData)
                const resultData = window._resultData;
                if (!resultData) return;
                
                const tabsContainer = document.getElementById('review-section-tabs');
                const questionsContainer = document.getElementById('review-questions-container');
                
                tabsContainer.innerHTML = '';
                
                const mcqSections = resultData.sections.filter(s => s.section_type !== 'coding');
                
                if (mcqSections.length === 0) {
                    questionsContainer.innerHTML = '<p class="text-slate-400">No MCQ sections to review.</p>';
                } else {
                    // Render first section by default
                    let activeTab = 0;
                    
                    function renderSectionTab(idx) {
                        activeTab = idx;
                        tabsContainer.querySelectorAll('.tab-btn').forEach((b, i) => {
                            b.className = `tab-btn px-4 py-2 rounded-lg text-sm font-medium transition ${
                                i === idx ? 'bg-purple-600 text-white' : 'glass text-slate-300 hover:bg-white/10'
                            }`;
                        });
                        renderSectionQuestions(mcqSections[idx]);
                    }
                    
                    mcqSections.forEach((s, idx) => {
                        const tab = document.createElement('button');
                        tab.className = 'tab-btn px-4 py-2 rounded-lg text-sm font-medium glass text-slate-300 hover:bg-white/10 transition';
                        tab.innerText = s.section_type.charAt(0).toUpperCase() + s.section_type.slice(1);
                        tab.onclick = () => renderSectionTab(idx);
                        tabsContainer.appendChild(tab);
                    });
                    
                    renderSectionTab(0);
                }
                
                document.getElementById('review-section').style.display = 'block';
                btn.innerText = '📋 Hide Answer Review';
                btn.disabled = false;
                reviewLoaded = true;
                
            } catch(e) {
                btn.innerText = '📋 View Answer Review';
                btn.disabled = false;
                console.error('Failed to load review', e);
            }
        }

        function renderSectionQuestions(sectionData) {
            const container = document.getElementById('review-questions-container');
            // Note: We show the stats we have — detailed per-question review would need
            // an additional API endpoint. Show summary stats for now.
            container.innerHTML = `
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="glass rounded-xl p-4 text-center border border-white/5">
                        <div class="text-2xl font-bold text-emerald-400">${sectionData.correct || 0}</div>
                        <div class="text-sm text-slate-400">Correct</div>
                    </div>
                    <div class="glass rounded-xl p-4 text-center border border-white/5">
                        <div class="text-2xl font-bold text-rose-400">${(sectionData.answered || 0) - (sectionData.correct || 0)}</div>
                        <div class="text-sm text-slate-400">Wrong</div>
                    </div>
                    <div class="glass rounded-xl p-4 text-center border border-white/5">
                        <div class="text-2xl font-bold text-slate-400">${(sectionData.question_count || 0) - (sectionData.answered || 0)}</div>
                        <div class="text-sm text-slate-400">Skipped</div>
                    </div>
                </div>
                <div class="glass rounded-xl p-5 border border-white/5">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="text-4xl font-bold text-purple-400">${sectionData.score.toFixed(1)}</div>
                        <div class="text-slate-400">/ ${sectionData.max_score} points</div>
                    </div>
                    <div class="h-2 rounded-full bg-white/10 overflow-hidden">
                        <div class="h-full rounded-full bg-gradient-to-r from-purple-500 to-violet-500 transition-all" style="width: ${Math.round(sectionData.score/sectionData.max_score*100)}%"></div>
                    </div>
                    <p class="text-xs text-slate-500 mt-3">Detailed per-question review will be available once solutions are published by the admin.</p>
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
