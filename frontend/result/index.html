<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Result & Report - Placement Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
        }
        .glass {
            background-color: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.4);
        }
        
        /* Confetti */
        .confetti-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">
    <div id="confetti-root" class="confetti-container"></div>
    
    <div class="max-w-4xl w-full space-y-8">
        <!-- Header -->
        <div class="text-center space-y-4 pt-8">
            <h1 class="text-4xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-emerald-400" id="exam-title">Loading Results...</h1>
            <p class="text-slate-400 text-lg">Detailed Exam Report & Solutions Review</p>
        </div>

        <!-- Score Highlights -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-8 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden md:col-span-1">
                <div class="absolute inset-0 bg-gradient-to-br from-purple-500/10 to-transparent pointer-events-none"></div>
                <p class="text-slate-400 font-medium mb-2 relative z-10">Total Score</p>
                <div class="text-5xl font-bold text-white relative z-10 flex items-baseline gap-2">
                    <span id="total-score">0</span>
                    <span class="text-xl text-slate-500">/ 480</span>
                </div>
            </div>
            
            <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center">
                <p class="text-slate-400 font-medium mb-2">Rank</p>
                <h3 class="text-4xl font-bold text-amber-400" id="rank-badge">#—</h3>
            </div>
            
            <div class="glass p-6 rounded-2xl flex flex-col items-center justify-center">
                <p class="text-slate-400 font-medium mb-2">Time Taken</p>
                <h3 class="text-3xl font-bold text-emerald-400" id="time-taken">—</h3>
            </div>
        </div>

        <!-- Section Breakdown -->
        <div class="glass p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-200">Section Breakdown</h3>
            <div class="space-y-6" id="sections-container">
                <!-- Dynamically injected -->
            </div>
        </div>

        <!-- Toggle Answer Review Button -->
        <button onclick="loadAnswerReview()" id="view-review-btn" class="w-full btn-gradient py-4 rounded-2xl font-bold text-lg transition shadow-xl flex items-center justify-center gap-3">
            <span>📋 View Detailed Question-by-Question Report</span>
            <span class="text-xs bg-black/30 px-3 py-1 rounded-full font-normal">Available for 2h</span>
        </button>

        <!-- Detailed Answer Review Container -->
        <div id="review-section" class="glass rounded-2xl p-8 space-y-6" style="display:none">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-white/10 pb-4">
                <div>
                    <h3 class="text-2xl font-bold text-white">Full Exam Solutions & Report</h3>
                    <p class="text-xs text-amber-300 mt-1 flex items-center gap-1" id="review-timer-badge">
                        <span>⏳ Questions auto-delete 2 hours after exam submission.</span>
                    </p>
                </div>
                <div class="flex gap-2 text-xs font-semibold">
                    <span class="px-3 py-1 rounded-lg bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">✓ Correct</span>
                    <span class="px-3 py-1 rounded-lg bg-rose-500/20 text-rose-400 border border-rose-500/30">✗ Wrong</span>
                    <span class="px-3 py-1 rounded-lg bg-slate-500/20 text-slate-400 border border-slate-500/30">— Unanswered</span>
                </div>
            </div>

            <!-- Section Tabs -->
            <div class="flex flex-wrap gap-2" id="review-section-tabs"></div>

            <!-- Questions Container -->
            <div id="review-questions-container" class="space-y-6 pt-2"></div>
        </div>
        
        <!-- Actions -->
        <div class="flex justify-center gap-6 pt-4">
            <button onclick="window.location.href='/dashboard/index.html'" class="glass px-8 py-3 rounded-xl font-medium hover:bg-white/5 transition-colors border-slate-700">Back to Dashboard</button>
            <button onclick="window.location.href='/leaderboard/index.html'" class="btn-gradient px-8 py-3 rounded-xl font-semibold shadow-lg">View Leaderboard</button>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';
        function getHeaders() {
            const token = localStorage.getItem('access_token');
            return { headers: { Authorization: `Bearer ${token}` } };
        }

        function createConfetti() {
            const root = document.getElementById('confetti-root');
            const colors = ['#7c3aed', '#a78bfa', '#10b981', '#f43f5e', '#f59e0b', '#3b82f6'];
            
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                conf.style.animationDelay = (Math.random() * 2) + 's';
                root.appendChild(conf);
            }
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
        
        function capitalize(s) { return s[0].toUpperCase() + s.slice(1); }

        function formatTime(seconds) {
            if (!seconds) return '—';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        let examId = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            examId = params.get('exam_id');
            
            if (!examId) {
                window.location.href = '/dashboard/index.html';
                return;
            }

            try {
                const res = await axios.get(`${API}/exams/${examId}/result/`, getHeaders());
                const data = res.data;
                window._resultData = data;
                
                document.getElementById('exam-title').innerText = data.exam_title || 'Mock Test Results';
                
                // Animate score
                animateValue(document.getElementById('total-score'), 0, data.total_score || 0, 2000);
                
                // Set Rank
                const rank = data.rank || '-';
                document.getElementById('rank-badge').innerText = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
                
                // Set Time
                document.getElementById('time-taken').innerText = formatTime(data.time_taken_seconds);
                
                // Sections
                const container = document.getElementById('sections-container');
                container.innerHTML = '';
                
                if (data.sections) {
                    data.sections.forEach(sec => {
                        const pct = sec.max_score ? Math.round((sec.score / sec.max_score) * 100) : 0;
                        const correctStr = sec.section_type === 'coding' ? '' : `<span class="text-xs text-slate-400">(${sec.correct}/${sec.question_count} correct)</span>`;
                        
                        container.innerHTML += `
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <div class="font-medium text-slate-200 flex items-center gap-2">
                                        ${capitalize(sec.section_type)}
                                        ${correctStr}
                                    </div>
                                    <div class="font-bold text-white">${sec.score} / ${sec.max_score}</div>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-2.5 border border-white/5 overflow-hidden">
                                    <div class="bg-gradient-to-r from-purple-500 to-indigo-500 h-2.5 rounded-full" style="width: ${pct}%"></div>
                                </div>
                            </div>
                        `;
                    });
                }
                
                createConfetti();
                
            } catch(e) {
                console.error(e);
                alert("Failed to load results.");
            }
        }

        let reviewLoaded = false;
        let reviewDataCache = null;

        async function loadAnswerReview() {
            const reviewSec = document.getElementById('review-section');
            const btn = document.getElementById('view-review-btn');

            if (reviewLoaded) {
                reviewSec.style.display = reviewSec.style.display === 'none' ? 'block' : 'none';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Loading Detailed Report...';

            try {
                const res = await axios.get(`${API}/exams/${examId}/review/`, getHeaders());
                const data = res.data;
                reviewDataCache = data;

                if (data.expired) {
                    reviewSec.innerHTML = `
                        <div class="p-8 bg-rose-950/40 border border-rose-500/30 rounded-2xl text-center space-y-3">
                            <div class="text-4xl mb-2">🔒</div>
                            <h3 class="text-2xl font-bold text-rose-400">Questions Auto-Deleted</h3>
                            <p class="text-slate-300 text-sm max-w-md mx-auto">The 2-hour post-exam review window has expired. As requested, all questions for this exam attempt have been automatically deleted from the server.</p>
                        </div>
                    `;
                    reviewSec.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = '🔒 Questions Auto-Deleted (Window Expired)';
                    return;
                }

                // Setup Timer Countdown Badge
                const remainingSecs = data.remaining_seconds || 0;
                const m = Math.floor(remainingSecs / 60);
                const h = Math.floor(m / 60);
                const minRem = m % 60;
                const timeStr = h > 0 ? `${h}h ${minRem}m` : `${minRem}m`;
                document.getElementById('review-timer-badge').innerHTML = `<span>⏳ Detailed report active. Questions will auto-delete in <strong class="text-amber-400">${timeStr}</strong>.</span>`;

                // Render Section Tabs
                const tabsContainer = document.getElementById('review-section-tabs');
                tabsContainer.innerHTML = '';

                data.sections.forEach((sec, idx) => {
                    const btnTab = document.createElement('button');
                    btnTab.className = `px-5 py-2.5 rounded-xl font-bold text-sm transition ${idx === 0 ? 'bg-purple-600 text-white shadow-lg' : 'bg-slate-800/80 text-slate-400 hover:text-white border border-white/5'}`;
                    btnTab.innerText = capitalize(sec.section_type);
                    btnTab.onclick = () => switchReviewTab(idx, data.sections);
                    btnTab.id = `review-tab-${idx}`;
                    tabsContainer.appendChild(btnTab);
                });

                renderReviewSectionContent(data.sections[0]);
                reviewSec.style.display = 'block';
                btn.disabled = false;
                btn.innerText = '📋 Hide Detailed Report';
                reviewLoaded = true;

            } catch(e) {
                btn.disabled = false;
                btn.innerText = '📋 View Detailed Question-by-Question Report';
                alert('Failed to load detailed report.');
            }
        }

        function switchReviewTab(activeIdx, sections) {
            sections.forEach((s, idx) => {
                const tab = document.getElementById(`review-tab-${idx}`);
                if (tab) {
                    tab.className = `px-5 py-2.5 rounded-xl font-bold text-sm transition ${idx === activeIdx ? 'bg-purple-600 text-white shadow-lg' : 'bg-slate-800/80 text-slate-400 hover:text-white border border-white/5'}`;
                }
            });
            renderReviewSectionContent(sections[activeIdx]);
        }

        function renderReviewSectionContent(sec) {
            const container = document.getElementById('review-questions-container');

            if (sec.section_type === 'coding') {
                if (!sec.problems || sec.problems.length === 0) {
                    container.innerHTML = '<p class="text-slate-400 text-center py-6">No coding problems submitted in this exam.</p>';
                    return;
                }

                container.innerHTML = sec.problems.map((p, idx) => `
                    <div class="glass p-6 rounded-2xl border border-white/10 space-y-4">
                        <div class="flex justify-between items-start border-b border-white/10 pb-3">
                            <div>
                                <h4 class="text-xl font-bold text-purple-300">Problem ${idx + 1}: ${p.title}</h4>
                                <p class="text-sm text-slate-300 mt-1">${p.statement || ''}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-emerald-400">${p.score} / ${p.max_score} pts</div>
                                <div class="text-xs text-slate-400 font-semibold mt-0.5">Status: ${p.status}</div>
                            </div>
                        </div>

                        <div>
                            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Your Submitted Solution:</div>
                            <pre class="bg-slate-900 p-4 rounded-xl border border-white/10 font-mono text-xs text-emerald-300 overflow-x-auto">${p.submitted_code}</pre>
                        </div>

                        <div class="grid grid-cols-2 gap-3 text-xs">
                            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                                <span class="text-slate-400 block">Sample Cases:</span>
                                <span class="font-bold text-slate-200">${p.passed_sample} / ${p.total_sample} passed</span>
                            </div>
                            <div class="bg-slate-800/50 p-3 rounded-lg border border-slate-700">
                                <span class="text-slate-400 block">Hidden Test Cases (Proportional):</span>
                                <span class="font-bold text-purple-400">${p.passed_hidden} / ${p.total_hidden} passed</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                return;
            }

            // MCQ Sections (Arithmetic, Verbal, Reasoning)
            if (!sec.questions || sec.questions.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center py-6">No questions found in this section.</p>';
                return;
            }

            container.innerHTML = sec.questions.map((q, idx) => {
                const statusBadge = q.status === 'correct' ? '<span class="px-3 py-1 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-xs font-bold">✓ Correct (+4 pts)</span>' :
                                    q.status === 'wrong' ? '<span class="px-3 py-1 rounded-full bg-rose-500/20 text-rose-400 border border-rose-500/30 text-xs font-bold">✗ Wrong</span>' :
                                    '<span class="px-3 py-1 rounded-full bg-slate-500/20 text-slate-400 border border-slate-500/30 text-xs font-bold">— Unanswered</span>';

                const optionsHtml = (q.options || []).map((opt, oIdx) => {
                    const isUserChoice = q.user_option_id === opt.id;
                    const isCorrect = opt.is_correct;
                    
                    let bgStyle = 'bg-slate-800/50 border-white/5 text-slate-300';
                    let choiceBadge = '';

                    if (isCorrect) {
                        bgStyle = 'bg-emerald-950/50 border-emerald-500/40 text-emerald-200 font-semibold';
                        choiceBadge = '<span class="ml-auto text-xs text-emerald-400 font-bold bg-emerald-500/20 px-2 py-0.5 rounded">Correct Answer</span>';
                    }
                    if (isUserChoice && !isCorrect) {
                        bgStyle = 'bg-rose-950/50 border-rose-500/40 text-rose-200 font-semibold';
                        choiceBadge = '<span class="ml-auto text-xs text-rose-400 font-bold bg-rose-500/20 px-2 py-0.5 rounded">Your Selection (Wrong)</span>';
                    } else if (isUserChoice && isCorrect) {
                        choiceBadge = '<span class="ml-auto text-xs text-emerald-400 font-bold bg-emerald-500/20 px-2 py-0.5 rounded">Your Selection (Correct ✅)</span>';
                    }

                    return `
                        <div class="p-3.5 rounded-xl border ${bgStyle} flex items-center gap-3 text-sm">
                            <span class="w-6 h-6 rounded-full bg-slate-700/50 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65 + oIdx)}</span>
                            <span>${opt.text}</span>
                            ${choiceBadge}
                        </div>
                    `;
                }).join('');

                return `
                    <div class="glass p-6 rounded-2xl border border-white/10 space-y-4">
                        <div class="flex justify-between items-start gap-4">
                            <h4 class="text-lg font-semibold text-slate-100"><span class="text-purple-400 font-bold">Q${idx + 1}.</span> ${q.text}</h4>
                            ${statusBadge}
                        </div>

                        <div class="space-y-2">
                            ${optionsHtml}
                        </div>

                        ${q.explanation ? `
                            <div class="p-3 bg-purple-950/30 border border-purple-500/20 rounded-xl text-xs text-purple-200 space-y-1">
                                <span class="font-bold text-purple-300 block">Explanation:</span>
                                <p class="leading-relaxed text-slate-300">${q.explanation}</p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
