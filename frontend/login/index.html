<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Arena - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .card-light {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.07);
        }
        .gradient-text {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transition: all 0.25s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -3px rgba(79, 70, 229, 0.3);
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">

    <!-- Subtle Background Ambient Light Blobs -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-indigo-100/60 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-100/60 rounded-full blur-[120px]"></div>
    </div>

    <div class="card-light w-full max-w-md rounded-3xl p-8 md:p-10 relative z-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl mb-4 font-extrabold text-2xl shadow-sm border border-indigo-100">
                ⚡
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2 text-slate-900">
                Placement <span class="gradient-text">Arena</span>
            </h1>
            <p class="text-slate-500 text-sm font-medium">Daily Placement Mock Assessment Platform</p>
        </div>

        <div id="error-msg" class="hidden bg-rose-50 border border-rose-200 text-rose-600 p-3.5 rounded-xl text-sm mb-6 text-center font-medium">
            Invalid credentials. Please try again.
        </div>

        <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
            <div>
                <label for="username" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Username</label>
                <input type="text" id="username" required
                    class="w-full bg-slate-50/70 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm font-medium"
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">Password</label>
                <div class="relative">
                    <input type="password" id="password" required
                        class="w-full bg-slate-50/70 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm font-medium"
                        placeholder="••••••••">
                    <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-3.5 text-slate-400 hover:text-slate-600 transition-colors">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>

            <button type="submit" id="login-btn" class="w-full btn-primary text-white font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 mt-4 text-sm shadow-md">
                <span>Sign In</span>
                <div id="loading-spinner" class="spinner hidden"></div>
            </button>
        </form>
    </div>

    <script>
        const API = window.location.origin + '/api';

        function togglePassword() {
            const pwd = document.getElementById('password');
            const type = pwd.getAttribute('type') === 'password' ? 'text' : 'password';
            pwd.setAttribute('type', type);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('loading-spinner');
            const errorMsg = document.getElementById('error-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            // UI State
            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const response = await axios.post(`${API}/auth/login/`, { username, password });
                const { access, refresh, user } = response.data;
                
                // Store tokens and user info
                localStorage.setItem('access_token', access);
                localStorage.setItem('refresh_token', refresh);
                localStorage.setItem('user_info', JSON.stringify({
                    id: user.id,
                    username: user.username,
                    display_name: user.display_name || user.first_name || user.username,
                    role: user.role
                }));

                // Redirect based on role
                if (user.role === 'admin') {
                    window.location.href = '/panel/index.html';
                } else {
                    window.location.href = '/dashboard/index.html';
                }
            } catch (error) {
                errorMsg.classList.remove('hidden');
                errorMsg.textContent = error.response?.data?.error || 'Login failed. Try again.';
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
