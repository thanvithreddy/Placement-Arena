<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Section - Placement Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .ide-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 72px);
            overflow: hidden;
        }
        .pane-left {
            width: 40%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 23, 42, 0.6);
        }
        .pane-right {
            width: 60%;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }
        #editor-container {
            flex: 1;
            min-height: 0;
        }
        .output-panel {
            height: 35%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: #090d16;
            display: flex;
            flex-direction: column;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Topbar -->
    <header class="glass h-[72px] px-6 flex justify-between items-center z-10 shrink-0 border-b border-white/10">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-emerald-400">Placement Arena</h1>
            <span class="text-slate-600">|</span>
            <span class="font-semibold text-slate-300">Coding Section</span>
        </div>
        
        <!-- Problem Tabs -->
        <div class="flex items-center gap-4">
            <div id="prob-tabs-container" class="flex bg-slate-800/80 rounded-xl p-1 border border-white/10">
                <!-- Dynamically populated buttons -->
            </div>

            <!-- Timer -->
            <div class="flex items-center gap-2 bg-slate-800/80 px-4 py-1.5 rounded-xl border border-white/10 text-amber-400 font-mono font-bold text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="timer">60:00</span>
            </div>

            <!-- Finish Exam Button -->
            <button id="finish-btn" onclick="finishExam()" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-semibold px-4 py-2 rounded-xl text-sm transition shadow-lg flex items-center gap-2">
                <span>Finish Exam & Results</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </header>

    <!-- Main IDE Area -->
    <div class="ide-container">
        <!-- Left Pane: Problem Statement -->
        <div class="pane-left p-6 overflow-y-auto">
            <div id="problem-loading" class="flex items-center justify-center h-full text-slate-400 text-sm">
                Loading problem statement...
            </div>
            <div id="problem-content" class="hidden space-y-6">
                <div>
                    <div class="flex items-center justify-between gap-3 mb-2">
                        <h2 id="prob-title" class="text-2xl font-bold text-white">Problem Title</h2>
                        <span id="prob-diff" class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">Easy</span>
                    </div>
                </div>

                <div id="prob-desc" class="space-y-4">
                    <!-- Injected HTML -->
                </div>
            </div>
        </div>

        <!-- Right Pane: Code Editor + Console -->
        <div class="pane-right">
            <!-- Controls Bar -->
            <div class="h-12 px-4 bg-slate-900/90 border-b border-white/10 flex justify-between items-center shrink-0">
                <div class="flex items-center gap-3">
                    <span class="text-xs text-slate-400 font-medium uppercase tracking-wider">Language:</span>
                    <select id="lang-select" onchange="changeLanguage()" class="bg-slate-800 text-slate-200 border border-white/10 text-xs rounded-lg px-3 py-1.5 focus:outline-none focus:border-purple-500">
                        <option value="python">Python 3</option>
                        <option value="cpp">C++ 17</option>
                        <option value="java">Java 15</option>
                        <option value="c">C 11</option>
                    </select>
                </div>

                <div class="flex items-center gap-3">
                    <button id="run-btn" onclick="runCode()" class="bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-emerald-500/30 px-4 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2 transition">
                        <svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                        <span>Run Code</span>
                    </button>
                    <button id="submit-btn" onclick="submitCode()" class="bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white px-5 py-1.5 rounded-lg text-xs font-semibold flex items-center gap-2 transition shadow-md">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span>Submit Code</span>
                    </button>
                </div>
            </div>

            <!-- Monaco Editor Container -->
            <div id="editor-container"></div>

            <!-- Console Output Panel -->
            <div class="output-panel">
                <div class="px-4 py-2 bg-slate-900 border-b border-white/5 text-xs font-semibold text-slate-400 uppercase tracking-wider flex justify-between items-center">
                    <span>Console & Test Case Results</span>
                    <span id="output-status" class="text-xs font-mono"></span>
                </div>
                <div class="p-4 flex-1 overflow-y-auto font-mono text-xs text-slate-300" id="console-output">
                    Click <strong>Run Code</strong> to test against sample cases, or <strong>Submit Code</strong> for evaluation.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        // Auto-refresh JWT token on 401
        axios.interceptors.response.use(
            response => response,
            async error => {
                const originalRequest = error.config;
                if (error.response?.status === 401 && !originalRequest._retry) {
                    originalRequest._retry = true;
                    try {
                        const refresh = localStorage.getItem('refresh_token');
                        if (!refresh) throw new Error('No refresh token');
                        const res = await axios.post(`${API}/auth/token/refresh/`, { refresh });
                        const newAccess = res.data.access;
                        localStorage.setItem('access_token', newAccess);
                        originalRequest.headers['Authorization'] = `Bearer ${newAccess}`;
                        return axios(originalRequest);
                    } catch(e) {
                        localStorage.clear();
                        window.location.href = '/login/index.html';
                        return Promise.reject(e);
                    }
                }
                return Promise.reject(error);
            }
        );

        function getHeaders() {
            const token = localStorage.getItem('access_token');
            return { headers: { Authorization: `Bearer ${token}` } };
        }

        const params = new URLSearchParams(window.location.search);
        let examId = params.get('exam_id');
        let attemptId = params.get('attempt_id');
        let sectionAttemptId = params.get('section_attempt_id');
        
        let problems = [];
        let currentProbIdx = 0;
        let editor;
        let timeLeft = 3600;
        let timerInterval;

        const defaultCodes = {
            python: '# Write Python 3 code here\n# Input: sys.stdin or input()\n\nimport sys\n\ndef main():\n    lines = sys.stdin.read().split()\n    if not lines:\n        return\n    # Implement logic\n    \nif __name__ == "__main__":\n    main()\n',
            cpp: '// Write C++17 code here\n#include <iostream>\n#include <vector>\nusing namespace std;\n\nint main() {\n    ios_base::sync_with_stdio(false);\n    cin.tie(NULL);\n    // Implement logic\n    return 0;\n}\n',
            java: '// Write Java 15 code here\nimport java.util.*;\n\npublic class Main {\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n        // Implement logic\n    }\n}\n',
            c: '// Write C11 code here\n#include <stdio>\n\nint main() {\n    // Implement logic\n    return 0;\n}\n'
        };

        async function init() {
            try {
                // Fetch coding problems directly
                let probRes;
                try {
                    probRes = await axios.get(`${API}/coding/problems/`, getHeaders());
                    problems = probRes.data || [];
                } catch(e) { problems = []; }

                document.getElementById('problem-loading').classList.add('hidden');
                document.getElementById('problem-content').classList.remove('hidden');

                if (problems.length === 0) {
                    document.getElementById('prob-title').innerText = 'No coding problems available';
                    document.getElementById('prob-desc').innerHTML = '<div class="p-4 bg-amber-500/10 border border-amber-500/20 rounded-xl text-amber-300 text-sm">No coding problems are currently uploaded by the admin. Click <strong>Finish Exam & Results</strong> above to view your exam score!</div>';
                    initEditor();
                    return;
                }

                renderProblemTabs();
                initEditor();
                startTimer();
                setInterval(autoSave, 30000);

            } catch(e) {
                console.error(e);
                alert("Failed to initialize coding section.");
            }
        }

        function renderProblemTabs() {
            const container = document.getElementById('prob-tabs-container');
            container.innerHTML = problems.map((p, idx) => `
                <button onclick="switchProblem(${idx})" id="tab-prob-${idx}" class="px-4 py-1.5 rounded-lg text-xs font-semibold ${idx === currentProbIdx ? 'bg-purple-600 text-white shadow-md' : 'text-slate-400 hover:text-white'} transition">
                    Problem ${idx + 1}
                </button>
            `).join('');
        }

        function initEditor() {
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById('editor-container'), {
                    value: defaultCodes.python,
                    language: 'python',
                    theme: 'vs-dark',
                    automaticLayout: true,
                    minimap: { enabled: false },
                    fontSize: 14,
                    padding: { top: 16 }
                });

                monaco.editor.defineTheme('arena-dark', {
                    base: 'vs-dark',
                    inherit: true,
                    rules: [],
                    colors: { 'editor.background': '#0f172a' }
                });
                monaco.editor.setTheme('arena-dark');

                if (problems.length > 0) {
                    loadProblem(0);
                }
            });
        }

        function switchProblem(idx) {
            autoSave();
            currentProbIdx = idx;
            renderProblemTabs();
            loadProblem(idx);
        }

        function loadProblem(idx) {
            const p = problems[idx];
            if (!p) return;

            document.getElementById('prob-title').innerText = p.title || `Problem ${idx + 1}`;
            
            const diffEl = document.getElementById('prob-diff');
            diffEl.innerText = (p.difficulty || 'medium').toUpperCase();
            diffEl.className = `px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${p.difficulty === 'easy' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : p.difficulty === 'medium' ? 'bg-amber-500/20 text-amber-400 border border-amber-500/30' : 'bg-rose-500/20 text-rose-400 border border-rose-500/30'}`;

            let html = `
                <div class="prose prose-invert max-w-none text-slate-300 space-y-4">
                    <p class="text-slate-200 font-normal leading-relaxed text-sm">${p.statement || p.description || 'No statement provided.'}</p>
                    
                    ${p.input_format ? `<div><h4 class="text-xs font-bold text-purple-300 uppercase tracking-wider mb-1">Input Format</h4><pre class="bg-slate-900/80 p-3 rounded-lg border border-white/5 text-xs font-mono text-slate-300 leading-relaxed">${p.input_format}</pre></div>` : ''}
                    ${p.output_format ? `<div><h4 class="text-xs font-bold text-purple-300 uppercase tracking-wider mb-1">Output Format</h4><pre class="bg-slate-900/80 p-3 rounded-lg border border-white/5 text-xs font-mono text-slate-300 leading-relaxed">${p.output_format}</pre></div>` : ''}
                    ${p.constraints ? `<div><h4 class="text-xs font-bold text-purple-300 uppercase tracking-wider mb-1">Constraints</h4><pre class="bg-slate-900/80 p-3 rounded-lg border border-white/5 text-xs font-mono text-slate-300 leading-relaxed">${p.constraints}</pre></div>` : ''}
            `;

            if (p.sample_cases && p.sample_cases.length > 0) {
                html += `<h4 class="text-xs font-bold text-purple-300 uppercase tracking-wider mt-4 mb-2">Sample Test Cases</h4>`;
                p.sample_cases.forEach((sc, i) => {
                    html += `
                        <div class="bg-slate-900/80 p-3 rounded-xl border border-white/5 text-xs space-y-2 mb-3">
                            <div class="font-bold text-slate-400">Sample Case ${i + 1}</div>
                            <div><span class="text-slate-500 block mb-0.5">Input:</span><pre class="bg-black/40 p-2 rounded text-emerald-300 font-mono">${sc.input_data}</pre></div>
                            <div><span class="text-slate-500 block mb-0.5">Expected Output:</span><pre class="bg-black/40 p-2 rounded text-emerald-300 font-mono">${sc.expected_output}</pre></div>
                            ${sc.explanation ? `<div class="text-slate-400 italic">Explanation: ${sc.explanation}</div>` : ''}
                        </div>
                    `;
                });
            }

            html += `</div>`;
            document.getElementById('prob-desc').innerHTML = html;

            const lang = document.getElementById('lang-select').value;
            const savedCode = localStorage.getItem(`code_${p.id}_${lang}`);
            if (editor) {
                if (savedCode) {
                    editor.setValue(savedCode);
                } else {
                    editor.setValue(defaultCodes[lang] || defaultCodes.python);
                }
            }
        }

        function changeLanguage() {
            const lang = document.getElementById('lang-select').value;
            const model = editor.getModel();
            monaco.editor.setModelLanguage(model, lang);
            
            const p = problems[currentProbIdx];
            if (p) {
                const savedCode = localStorage.getItem(`code_${p.id}_${lang}`);
                editor.setValue(savedCode || defaultCodes[lang] || defaultCodes.python);
            }
        }

        function autoSave() {
            if (!editor || !problems[currentProbIdx]) return;
            const p = problems[currentProbIdx];
            const lang = document.getElementById('lang-select').value;
            const code = editor.getValue();
            localStorage.setItem(`code_${p.id}_${lang}`, code);
        }

        async function runCode() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            btn.innerHTML = 'Running...';
            
            const p = problems[currentProbIdx];
            const lang = document.getElementById('lang-select').value;
            const code = editor.getValue();
            const out = document.getElementById('console-output');
            
            out.innerHTML = '<span class="text-slate-400">Executing code against sample cases...</span>';
            document.getElementById('output-status').innerText = '';

            try {
                const res = await axios.post(`${API}/coding/run/`, {
                    problem_id: p.id,
                    language: lang,
                    code: code
                }, getHeaders());

                const data = res.data;
                if (data.results) {
                    out.innerHTML = data.results.map((r, i) => `
                        <div class="mb-2 p-2 rounded ${r.passed ? 'bg-emerald-950/40 border border-emerald-500/20' : 'bg-rose-950/40 border border-rose-500/20'}">
                            <div class="font-bold ${r.passed ? 'text-emerald-400' : 'text-rose-400'}">Sample Case ${i+1}: ${r.passed ? 'PASSED ✅' : 'FAILED ❌'}</div>
                            <div class="text-slate-400">Input: <span class="font-mono text-slate-200">${r.input}</span></div>
                            <div class="text-slate-400">Expected: <span class="font-mono text-slate-200">${r.expected}</span></div>
                            <div class="text-slate-400">Actual Output: <span class="font-mono ${r.passed ? 'text-emerald-300' : 'text-rose-300'}">${r.stdout || r.stderr || '(empty)'}</span></div>
                        </div>
                    `).join('');
                } else {
                    out.innerHTML = `<pre class="text-slate-200">${data.stdout || data.stderr || 'No output'}</pre>`;
                }
            } catch(e) {
                out.innerHTML = `<span class="text-rose-400">Execution Error: ${e.response?.data?.error || e.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-4 h-4 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg> <span>Run Code</span>`;
            }
        }

        async function submitCode() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = 'Evaluating...';
            
            const p = problems[currentProbIdx];
            const lang = document.getElementById('lang-select').value;
            const code = editor.getValue();
            const out = document.getElementById('console-output');

            out.innerHTML = '<span class="text-purple-300">Evaluating against all test cases (sample + hidden)...</span>';
            
            try {
                const res = await axios.post(`${API}/coding/submit/`, {
                    problem_id: p.id,
                    language: lang,
                    code: code,
                    exam_attempt_id: attemptId
                }, getHeaders());
                
                const data = res.data;
                out.innerHTML = `
                    <div class="p-3 bg-purple-950/40 border border-purple-500/30 rounded-xl space-y-1">
                        <div class="text-lg font-bold ${data.status === 'Accepted' ? 'text-emerald-400' : 'text-amber-400'}">${data.status === 'Accepted' ? '🎉 Accepted!' : data.status}</div>
                        <div class="text-sm font-semibold text-slate-200">Score Earned: <span class="text-emerald-400">${data.score}</span> / ${p.max_score || 100} pts</div>
                        <div class="text-xs text-slate-400">Passed Hidden Cases: ${data.passed_hidden || 0} / ${data.total_hidden || 0}</div>
                    </div>
                `;
            } catch(e) {
                out.innerHTML = `<span class="text-rose-400">Submission Error: ${e.response?.data?.error || e.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> <span>Submit Code</span>`;
            }
        }

        async function finishExam() {
            try {
                if (sectionAttemptId) {
                    await axios.post(`${API}/exams/sections/${sectionAttemptId}/submit/`, {}, getHeaders());
                }
                window.location.href = `/result/index.html?exam_id=${examId}`;
            } catch(e) {
                window.location.href = `/result/index.html?exam_id=${examId}`;
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's up for Coding section!");
                    finishExam();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const h = Math.floor(timeLeft / 3600);
            const m = Math.floor((timeLeft % 3600) / 60);
            const s = timeLeft % 60;
            const pad = num => num.toString().padStart(2, '0');
            document.getElementById('timer').innerText = h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        }

        window.onload = init;
    </script>
</body>
</html>
